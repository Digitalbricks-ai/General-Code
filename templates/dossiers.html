{% extends "base.html" %}
{% block content %}
<h1>Dossiers</h1>
<form method="post">
    <input type="text" name="name" placeholder="Dossier Name" required>
    <button type="submit">Add Dossier</button>
</form>
<ul>
{% for d in dossiers.values() %}
    <li>{{ d['name'] }} (Objects: {{ d['objects']|length }}, Relationships: {{ d['relationships']|length }})</li>
{% endfor %}
</ul>
{% endblock %}
